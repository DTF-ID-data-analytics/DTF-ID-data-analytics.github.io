<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Department of Treasury and Finance</title>
<style>
  :root {
    --navy: #002244;
    --gold: #A88B3E;
    --blue: #0080ff;
    --purple: #8c00ff;
    --paper: #1c1c1c;
    --ink: #F5F4F0;
  }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    background: var(--paper);
    color: var(--ink);
    font-family: Arial, 'Times New Roman', serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .plate {
    text-align: center;
    padding: 3rem 4rem;
    border-top: 3px solid var(--ink);
    border-bottom: 3px solid var(--ink);
  }
  .dept {
    font-size: 2.5rem;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blue);
    margin: 0 0 0.6rem 0;
  }
  .division {
    font-weight:200;
    font-size: 2rem;
    text-transform: uppercase;
    letter-spacing:0.1em;
    color: var(--purple);
    margin: 2vh 0 2.5vh 0;
  }
  .team {
    font-size: 1.5rem;
    letter-spacing: 0.25em;
    color: var(--gold);
    margin: 0;
  }
</style>
</head>
<body>
  <div id="main" class="plate">
    <p class="dept">Department of Treasury and Finance</p>
    <p class="division">Infrastructure Division</p>
    <p class="team">Data Analytics Team</p>
  </div>
</body>
</html>
